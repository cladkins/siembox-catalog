name: validate-catalog

# Gate every submission. Each portable parser must pass strict schema validation
# AND its own self-tests, run through the real SIEMBox parse -> derive -> normalize
# pipeline; detections are validated against what the rules engine actually
# supports. Parser regexes added or changed in the PR are also ReDoS-scanned.
#
# This workflow runs on EVERY PR to main (no path filter) so it can always report
# status and is therefore safe to mark as a required branch-protection check.
# The expensive build + validate steps run only when parser/detection/schema
# files actually change; otherwise the job no-ops to green in seconds.
#
# Security posture: this uses `pull_request` (NOT `pull_request_target`), so fork
# PRs run with a read-only token and no access to repo secrets. The validator is
# built from the trusted cladkins/siembox repo, never from the PR, so a fork
# cannot alter validation logic. Third-party actions are pinned to commit SHAs.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pin the validator to a known-good SIEMBox ref; bump to upgrade the engine.
  SIEMBOX_REF: main

jobs:
  validate-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout catalog (PR head)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: catalog
          # Full history so we can diff against the PR base commit.
          fetch-depth: 0

      - name: Detect relevant changes
        id: changes
        working-directory: catalog
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "parsers_changed=false" >> "$GITHUB_OUTPUT"
            echo "Manual run: validating the entire catalog."
            exit 0
          fi
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          CHANGED="$(git diff --name-only "$BASE_SHA" HEAD -- parsers detections schema || true)"
          if [ -n "$CHANGED" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            echo "Parser/detection/schema changes detected:"; echo "$CHANGED"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No parser/detection/schema changes; validation steps skipped."
          fi
          PARSERS="$(git diff --name-only --diff-filter=AM "$BASE_SHA" HEAD -- parsers | grep '\.parser\.json$' || true)"
          if [ -n "$PARSERS" ]; then
            echo "parsers_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "parsers_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: ReDoS pre-scan (changed parser regexes)
        if: steps.changes.outputs.parsers_changed == 'true'
        working-directory: catalog
        env:
          # Only parsers added/modified in this PR are gated; pre-existing
          # parsers are grandfathered for a dedicated cleanup PR.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          npm install recheck@4 --no-save --no-audit --no-fund
          node .github/scripts/redos-scan.mjs

      - name: Duplicate-name check (parsers + detections)
        if: steps.changes.outputs.relevant == 'true'
        working-directory: catalog
        run: |
          npm install js-yaml --no-save --no-audit --no-fund
          node .github/scripts/duplication-check.mjs

      - name: Checkout validator (trusted SIEMBox)
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: cladkins/siembox
          ref: ${{ env.SIEMBOX_REF }}
          path: siembox

      - name: Set up Node.js
        if: steps.changes.outputs.relevant == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: siembox/backend/package-lock.json

      - name: Build validator
        if: steps.changes.outputs.relevant == 'true'
        working-directory: siembox/backend
        run: npm ci && npm run build

      - name: Validate parsers (strict + self-tests)
        if: steps.changes.outputs.relevant == 'true'
        working-directory: siembox/backend
        run: npm run validate-parsers -- "$GITHUB_WORKSPACE/catalog/parsers"

      - name: Validate detections (strict)
        if: steps.changes.outputs.relevant == 'true'
        working-directory: siembox/backend
        run: |
          DET="$GITHUB_WORKSPACE/catalog/detections"
          if [ -d "$DET" ] && find "$DET" -name '*.yaml' -print -quit | grep -q .; then
            npm run validate-detections -- "$DET"
          else
            echo "No detections to validate."
          fi
