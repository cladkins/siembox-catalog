name: Service Account Interactive Login
description: >
  Detects interactive login attempts by service accounts.
  Service accounts (svc_, service_, *_service naming patterns) should only be used for automated processes
  and should not have interactive shell access.
  Interactive login by service account may indicate compromised credentials, misconfiguration, or improper account usage.
  Low severity informational alert for auditing.
severity: low
enabled: true
tags: [service-account, login, access-control, audit, ssh]

conditions:
  - field: user
    operator: regex
    value: "(^svc_|^service_|_service$|_svc$)"
  - field: event
    operator: contains
    value: "Accepted"

alert:
  title: "Service Account Interactive Login: {user}"
  description: >
    Service account {user} logged in interactively from {source_ip} to {hostname}.
    Service accounts should not have interactive access.
    Review if legitimate administrative action, verify account purpose and permissions,
    check for compromised service credentials, investigate source IP and authentication method,
    review commands executed if session was established,
    consider disabling interactive login for service accounts,
    and audit service account usage patterns.
    This is informational but may indicate security policy violation.
