name: Home Assistant Unauthorized Automation
description: >
  Detects unauthorized automation changes in Home Assistant.
  Automation modifications should be logged and reviewed for unauthorized changes
  that could affect physical security, privacy, or safety.
  Single event detection for any automation change.
severity: medium
# DISABLED: automation_triggered / automation_name / user are NOT present in the default
# home-assistant.log. Automation events live in HA's logbook/recorder database, which
# SIEMBox does not ingest. Re-enable only with a structured HA event feed (logbook export
# or MQTT/event-stream shipper). See APP-005 for the default-log HA signal.
enabled: false
tags: [home-assistant, automation, iot, smart-home, configuration-change]

conditions:
  - field: event_type
    operator: equals
    value: "automation_triggered"
  - field: user
    operator: not_equals
    value: "admin"

alert:
  title: "Home Assistant Automation Triggered by Non-Admin: {user}"
  description: >
    Automation '{automation_name}' was triggered by non-admin user {user} from {client_ip}.
    Review automation changes made, verify legitimate user action,
    check if automation affects security devices, test automation for malicious behavior,
    and revert unauthorized changes if needed.
