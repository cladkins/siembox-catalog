name: Unusual Media Streaming Pattern
description: >
  Detects excessive streaming that may indicate account sharing or abuse.
  The Jellyfin and Plex parsers emit event "playback_start" per playback (Jellyfin
  SessionManager "Playback start ..." / Plex "Completed: [ip] 200 GET /:/timeline?...state=playing").
  600 starts from one source IP in 24h is informational for monitoring usage patterns.
  Adjust threshold based on household size and typical usage.
severity: low
enabled: true
tags: [plex, jellyfin, media-streaming, account-sharing, bandwidth]

conditions:
  - field: event
    operator: equals
    value: "playback_start"

aggregation:
  field: source_ip
  timeframe: 24h
  threshold: 600

alert:
  title: "High Media Streaming Volume from {source_ip}"
  description: >
    {count} playback starts from {source_ip} in 24 hours.
    Review user account and stream patterns, check for concurrent streams from different IPs,
    verify credentials have not been shared, review bandwidth usage,
    and consider stream limits if excessive.
