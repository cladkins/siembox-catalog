name: SSH Brute Force Detection
description: >
  Detects automated SSH brute force attacks based on failed password attempts.
  5 failed attempts in 5 minutes balances detection with preventing false positives from legitimate user typos.
  Homelab environments have small user bases, so legitimate failures should be rare.
severity: high
enabled: true
tags: [ssh, brute-force, authentication, attack]

conditions:
  - field: event
    operator: contains
    value: "Failed password"
  - field: service
    operator: equals
    value: "sshd"

aggregation:
  field: source_ip
  timeframe: 5m
  threshold: 5

alert:
  title: "SSH Brute Force Attack from {source_ip}"
  description: >
    {count} failed SSH password attempts from {source_ip} in 5 minutes.
    Targeted user: {user}.
    Review source IP reputation, check if any attempts succeeded,
    verify IP is not from known admin, and consider IP blocking if persistent.
