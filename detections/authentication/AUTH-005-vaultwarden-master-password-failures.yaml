name: Vaultwarden Master Password Failures
description: >
  Detects failed master password attempts on Vaultwarden password manager.
  VERY LOW threshold (3 attempts) because Vaultwarden compromise is catastrophic - contains ALL user credentials.
  Any repeated failures require immediate investigation.
severity: critical
enabled: true
tags: [vaultwarden, password-manager, authentication, brute-force, critical]

conditions:
  - field: service
    operator: equals
    value: "vaultwarden"
  - field: message
    operator: contains
    value: "Username or password is incorrect"

aggregation:
  field: source_ip
  timeframe: 10m
  threshold: 3

alert:
  title: "CRITICAL: Vaultwarden Master Password Brute Force from {source_ip}"
  description: >
    {count} failed master password attempts from {source_ip} in 10 minutes.
    Vaultwarden compromise would expose ALL stored credentials.
    IMMEDIATE INVESTIGATION REQUIRED.
    Verify if legitimate user or active attack.
    Consider temporary IP block and contact vault owner immediately.
