name: Multiple Failed SSO Authentication Attempts
description: >
  Detects brute force attacks against SSO authentication portals (Authelia, authentik, Keycloak).
  SSO systems protect multiple downstream services, so compromise has cascading impact.
  5 failures in 5 minutes indicates automated attack.
severity: high
enabled: true
tags: [authentication, brute-force, sso, authelia, authentik, keycloak, attack]

conditions:
  - field: service
    operator: regex
    value: "authelia|authentik|keycloak"
  - field: event
    operator: contains
    value: "authentication failed"

aggregation:
  field: source_ip
  timeframe: 5m
  threshold: 5

alert:
  title: "SSO Brute Force Attack from {source_ip}"
  description: >
    {count} failed SSO authentication attempts from {source_ip} in 5 minutes against {service}.
    SSO compromise would affect multiple downstream services.
    Review source IP reputation, verify no successful authentications occurred,
    consider temporary IP block, and alert affected user if personal account.
