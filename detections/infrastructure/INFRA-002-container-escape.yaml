name: Container Escape Attempt
description: >
  Detects attempts to escape container isolation to host system.
  Container escape is a critical attack technique allowing full system compromise from containerized applications.
  Monitors for access to docker.sock, cgroup manipulation, namespace operations, and kernel exploitation techniques.
severity: critical
enabled: true
tags: [container, docker, privilege-escalation, critical, infrastructure]

conditions:
  - field: message
    operator: regex
    value: '(docker\.sock|/proc/self/cgroup|/sys/class/net|capsh|unshare|nsenter|/host/)'

alert:
  title: "CRITICAL: Container Escape Attempt on {hostname}"
  description: >
    Container escape technique detected: {message}.
    IMMEDIATE INVESTIGATION REQUIRED.
    Container breakout attempts indicate advanced attacker with container knowledge.
    Isolate container immediately, review container runtime configuration,
    check host system integrity, and audit all recent container activities.
    This is a potential full system compromise.
