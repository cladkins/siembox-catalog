name: Unusual Smart Device Automation Trigger
description: >
  Detects automation triggers during unexpected times or with unexpected trigger types.
  Security-related automations triggered during late hours (1am-5am) or via non-scheduled methods
  may indicate unauthorized access to Home Assistant or tampering with smart home controls.
severity: medium
# DISABLED: event_type=automation_triggered / trigger_type / automation_name are NOT in the
# default home-assistant.log (they live in HA's logbook/recorder DB, not ingested by SIEMBox).
# Re-enable only with a structured HA event feed (logbook/MQTT). See APP-005 for the
# default-log HA brute-force signal.
enabled: false
tags: [iot, home-assistant, automation, smart-home, physical-security]

conditions:
  - field: event_type
    operator: equals
    value: "automation_triggered"
  - field: trigger_type
    operator: not_equals
    value: "scheduled"
  - field: timestamp
    operator: regex
    value: "T0[1-5]:"

alert:
  title: "Unusual Smart Home Automation Trigger: {automation_name}"
  description: >
    Automation '{automation_name}' triggered at unusual hour via non-scheduled trigger from {client_ip}.
    Review automation details and trigger source, verify if scheduled or unexpected trigger,
    check for unauthorized access to Home Assistant, review what devices were controlled,
    verify no physical security implications,
    and investigate if persistent pattern occurs.
