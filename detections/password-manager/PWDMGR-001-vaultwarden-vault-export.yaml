name: Vaultwarden Vault Export
description: >
  Detects vault export operations that could indicate credential theft.
  Vault exports are rare operations that export ALL stored credentials in plaintext format.
  This is a high-risk operation that should be closely monitored and verified as legitimate.
severity: critical
# Unworkable from Vaultwarden's default logs: it does not log vault-export
# operations to its log stream (only the org/Bitwarden DB event-log, which
# SIEMBox does not ingest yet). Disabled until that source is available.
enabled: false
tags: [vaultwarden, password-manager, data-exfiltration, critical, credential-theft]

conditions:
  - field: service
    operator: equals
    value: "vaultwarden"
  - field: action
    operator: equals
    value: "vault_export"

alert:
  title: "CRITICAL: Vault Export by {user} from {source_ip}"
  description: >
    Complete credential vault export detected for user {user} from {source_ip}.
    This exports ALL stored credentials in plaintext.
    IMMEDIATE INVESTIGATION - potential credential theft.
    Verify legitimate user backup operation.
    Contact user immediately to confirm.
    Review export contents if accessible and check for subsequent unusual activity.
