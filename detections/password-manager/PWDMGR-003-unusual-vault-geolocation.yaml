name: Unusual Vault Access Geolocation
description: >
  Detects a successful Vaultwarden login from a country outside the configured
  home-country list (geo_foreign). A successful master-password login from a
  foreign country may indicate account compromise or credential theft.
  Requires GeoIP enrichment (DB-IP lite) and GEOIP_HOME_COUNTRIES to be set.
severity: high
enabled: true
tags: [vaultwarden, password-manager, geolocation, anomaly, travel]

conditions:
  - field: service
    operator: equals
    value: "vaultwarden"
  - field: event
    operator: equals
    value: "login_success"
  - field: geo_foreign
    operator: equals
    value: true

alert:
  title: "Foreign Vault Login: {user} from {country} ({source_ip})"
  description: >
    Successful Vaultwarden login by {user} from {source_ip} in {country},
    which is outside the configured home country list.
    Verify the user's travel status, contact the user to confirm, check for
    concurrent logins from other locations, review recently accessed vault items,
    and consider session termination and geographic restrictions if suspicious.
